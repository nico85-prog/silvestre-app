name: Verify Firebase IAM

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Get IAM policy
        working-directory: docs
        env:
          FIREBASE_REFRESH_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: python verify_iam.py
