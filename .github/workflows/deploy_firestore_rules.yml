name: Deploy Firestore Rules

# Deploy MANUALE per le rules Firestore. Solo trigger esplicito.
on:
  workflow_dispatch:

jobs:
  deploy_rules:
    name: Deploy firestore.rules to Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy rules
        uses: w9jds/firebase-action@v14.10.1
        with:
          args: deploy --only firestore:rules --project silvestre-fotoservizi --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_PATH: ./firebase
