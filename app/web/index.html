<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Silvestre Fotoservizi — stampe foto, fotolibri, calendari e regali personalizzati. Ordini in app, ritiro in negozio a Frattamaggiore (NA). Dal 1970.">
  <meta name="theme-color" content="#F47521">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Silvestre">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Silvestre Fotoservizi" />
  <meta property="og:description" content="Stampe foto e regali personalizzati. Ritiro a Frattamaggiore." />
  <meta property="og:image" content="icons/Icon-512.png" />
  <meta property="og:type" content="website" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Silvestre Fotoservizi</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Auto-update PWA: se il service worker rileva una versione nuova,
    // ricarica automaticamente la pagina (no cache stale su mobile).
    if ('serviceWorker' in navigator) {
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
      // Check immediato all'apertura della pagina
      window.addEventListener('load', () => {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.update());
        });
      });
      // Forza il check del SW ogni volta che torni sulla tab
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          navigator.serviceWorker.getRegistrations().then(regs => {
            regs.forEach(r => r.update());
          });
        }
      });
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
